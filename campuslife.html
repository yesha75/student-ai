<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080B14;color:#E8EAF0;font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0D1120}::-webkit-scrollbar-thumb{background:#1A2035;border-radius:3px}
.glass{background:rgba(13,17,32,.85);backdrop-filter:blur(20px);border:1px solid rgba(26,32,53,.8);border-radius:16px}
.grid-bg{background-image:linear-gradient(rgba(108,99,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.03) 1px,transparent 1px);background-size:40px 40px}
.shimmer{background:linear-gradient(90deg,#6C63FF,#00F5C4,#6C63FF);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
.score-bar{height:6px;border-radius:3px;background:#1A2035;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width 1s ease}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;border:1px solid transparent;cursor:pointer;transition:all .15s;background:transparent;width:100%;text-align:left;color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;font-size:13px}
.nav-btn:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.7)}
.nav-btn.active{background:rgba(108,99,255,.18);border-color:rgba(108,99,255,.3);color:#fff}
.btn-pr{background:linear-gradient(135deg,#6C63FF,#00F5C4);color:#fff;border:none;border-radius:12px;padding:10px 20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;transition:opacity .2s}
.btn-pr:hover{opacity:.85}.btn-pr:disabled{opacity:.4;cursor:not-allowed}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fi{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.fi{animation:fi .45s ease-out forwards}
.fl{animation:fl 5s ease-in-out infinite}
.sp{animation:sp 8s linear infinite}
</style>
</head>

/* AI */
function getAI(text,profile){
  const t=text.toLowerCase();
  const eT=/exam.{0,20}tomorrow|tomorrow.{0,20}exam/i.test(t);
  const cM=t.match(/(\d+)\s*ch(apter)?s?\s*(left|remaining|to (cover|study|read))/i);
  const cL=cM?parseInt(cM[1]):null;
  const sM=t.match(/\b(chemistry|physics|math|statistics|machine learning|deep learning|biology|calculus)\b/i);
  const sub=sM?sM[1]:'your subject';
  const stressed=(profile.scores.stress>60)||/stress|panic|anxious|worried|overwhelm/i.test(t);
  const noSleep=/sleep|tired|exhausted|no sleep/i.test(t);
  const money=/broke|money|budget|afford|rent/i.test(t);
  if(eT&&cL){
    const m=Math.max(Math.min(Math.floor(600/cL),45),15);
    return{
      summary:`You have ${cL} chapters of ${sub} left and the exam is tomorrow. That's ~${m} min per chapter if you start now. Completely doable — stop the panic and follow this plan.`,
      warnings:[`${cL} chapters remaining — high-pressure crunch mode.`,stressed?'Panic kills retention. Follow the plan step by step.':null].filter(Boolean),
      recs:[`Spend ${m} min per chapter — key definitions, formulas, past paper questions only.`,'Prioritise highest-weightage chapters first. Skip detailed reading, use headings only.','After every 3 chapters: 10-min active recall — write key points from memory.','Stop studying by 11 PM. Sleep is non-negotiable for memory consolidation.'],
      plan:[{t:'09:00',task:`${sub} — Chapters 1–3 (scan + key points)`,dur:`${m*3}min`,p:'high'},{t:'10:30',task:`${sub} — Chapters 4–6`,dur:`${m*3}min`,p:'high'},{t:'11:00',task:'Break — walk, water, no phone',dur:'10min',p:'low'},{t:'11:10',task:`${sub} — Chapters 7–10`,dur:`${m*4}min`,p:'high'},{t:'13:00',task:'Lunch — proper meal',dur:'45min',p:'medium'},{t:'13:45',task:`${sub} — Chapters 11–${Math.min(cL,16)}`,dur:'90min',p:'high'},{t:'15:30',task:'Past paper — 20 questions timed',dur:'60min',p:'high'},{t:'22:00',task:'Key formulas only, then SLEEP by 11:30',dur:'30min',p:'medium'}],
    };
  }
  if(eT){
    return{
      summary:`Your ${sub} exam is tomorrow. The next 10 hours are critical. Active recall beats re-reading everything.`,
      warnings:['Time is critical — passive re-reading wastes it. Active recall only.'],
      recs:['List top 10 exam topics from past papers or syllabus.','For each: write a 1-page summary from memory, then check notes.','Do 20+ past paper questions — highest ROI activity before any exam.','Sleep by midnight — memory consolidation happens during sleep.'],
      plan:[{t:'09:00',task:`${sub} — Identify top 10 exam topics`,dur:'30min',p:'high'},{t:'09:30',task:`${sub} — Active recall topics 1-4`,dur:'90min',p:'high'},{t:'11:00',task:'Break — hydrate, 10 min walk',dur:'15min',p:'low'},{t:'11:15',task:`${sub} — Active recall topics 5-8`,dur:'90min',p:'high'},{t:'13:00',task:'Lunch',dur:'45min',p:'medium'},{t:'13:45',task:'Past paper questions (20 timed)',dur:'90min',p:'high'},{t:'22:00',task:'Key formulas only, then sleep',dur:'30min',p:'medium'}],
    };
  }
  if(money)return{summary:`Financial pressure on top of studies — that's real cognitive load. Let's cut the stress and get practical.`,warnings:['Financial stress directly reduces academic performance — address it today.'],recs:['List every expense from last 7 days — cut 1-2 non-essentials.','Check if your university has an emergency student hardship fund.','Meal prep 3 days of food — saves $8-15/day and decision fatigue.','Set a daily spending limit and track every purchase.'],plan:[{t:'10:00',task:'Write full monthly budget — income vs every expense',dur:'30min',p:'high'},{t:'10:30',task:'Research university financial aid online',dur:'20min',p:'high'},{t:'14:00',task:'Focused study block — top priority subject',dur:'90min',p:'high'}]};
  if(noSleep)return{summary:`You're running on low sleep. Cognitive performance is reduced right now. Work smarter, not harder.`,warnings:['Sleep deprivation reduces memory retention by 40%.','Plan a proper recovery night tonight.'],recs:['45-minute focused block now — not longer, your attention span is shorter.','Take a 20-min nap before 3 PM — proven to restore alertness.','Skip low-priority tasks today completely.','Commit to 7+ hours sleep tonight.'],plan:[{t:'09:00',task:'Highest priority task — 45 min max',dur:'45min',p:'high'},{t:'09:50',task:'20-min nap (set alarm)',dur:'20min',p:'medium'},{t:'10:15',task:'Second priority — another 45 min block',dur:'45min',p:'high'},{t:'11:00',task:'Light walk outside, no screens',dur:'20min',p:'low'}]};
  return{summary:`${text.trim()?`You said: "${text.trim()}". `:''}Plan based on your streak (${profile.streak}d), ${profile.tokens} tokens, stress ${profile.scores.stress}/100.`,warnings:[profile.scores.stress>65?`Stress at ${profile.scores.stress}/100 — add recovery time today.`:null].filter(Boolean),recs:['Start with hardest subject in a 90-min deep work block — phone away.','Review yesterday notes for 10 min before new material (spaced repetition).','Plan tomorrow the night before — 5 min saves 30 min of confusion.','Take a real break every 90 min — walk, not scroll.'],plan:[{t:'09:00',task:'Deep work — highest priority subject, phone away',dur:'90min',p:'high'},{t:'10:30',task:'Break — walk + water',dur:'15min',p:'low'},{t:'10:45',task:"Review yesterday's notes — active recall",dur:'30min',p:'medium'},{t:'11:15',task:'Second priority subject or assignment',dur:'75min',p:'high'},{t:'14:00',task:'Past paper / practice problems',dur:'60min',p:'high'}]};
}

/* MINI COMPONENTS */
function Card({ch,style={}}){return <div className="glass" style={style}>{ch}</div>}
function SRing({label,icon,value,type}){
  const r=38,c=2*Math.PI*r;
  const col=type==='stress'?(value<=30?'#00F5C4':value<=55?'#FFD700':'#FF6B6B'):(value>=80?'#00F5C4':value>=60?'#4FC3F7':value>=40?'#FFD700':'#FF6B6B');
  const eff=type==='stress'?100-value:value;
  const off=c-(eff/100)*c;
  const sl=type==='stress'?(value<=30?'Zen':value<=55?'Managing':'Overloaded'):(value>=80?'Excellent':value>=60?'Good':value>=40?'Needs Work':'Critical');
  return(
    <div className="glass" style={{padding:'14px',display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}}>
      <svg width="88" height="88" viewBox="0 0 88 88">
        <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(26,32,53,.8)" strokeWidth="7"/>
        <circle cx="44" cy="44" r={r} fill="none" stroke={col} strokeWidth="7" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} transform="rotate(-90 44 44)" style={{filter:`drop-shadow(0 0 4px ${col}80)`}}/>
        <text x="44" y="39" textAnchor="middle" fontSize="15" fill={col}>{icon}</text>
        <text x="44" y="55" textAnchor="middle" fontSize="12" fontWeight="700" fontFamily="Syne" fill={col}>{value}</text>
      </svg>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:'Syne',fontWeight:600,fontSize:'12px',color:'rgba(255,255,255,.85)'}}>{label}</div>
        <div style={{fontSize:'10px',color:col,marginTop:'1px'}}>{sl}</div>
      </div>
    </div>
  );
}
function Bar({data,color}){
  const max=Math.max(...data.map(d=>d.v),1);
  return <div style={{display:'flex',alignItems:'flex-end',gap:'5px',height:'96px',width:'100%'}}>
    {data.map(d=><div key={d.d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}>
      <div style={{width:'100%',borderRadius:'3px 3px 0 0',background:d.v>0?`linear-gradient(180deg,${color},${color}80)`:'rgba(255,255,255,.04)',height:`${Math.max((d.v/max)*78,d.v>0?5:2)}px`,minHeight:2}}/>
      <span style={{fontSize:'9px',color:'rgba(255,255,255,.3)',fontFamily:'JetBrains Mono'}}>{d.d}</span>
    </div>)}
  </div>;
}

/* PAGE: DASHBOARD */
function PgDash({profile,setProfile}){
  const [q,setQ]=useState('');
  const [res,setRes]=useState(null);
  const [load,setLoad]=useState(false);
  const [tok,setTok]=useState(profile.tokens||340);
  const sc=profile.scores||{academic:72,finance:58,stress:64};
  const hr=new Date().getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const ask=async()=>{
    if(!q.trim()||load)return;
    setLoad(true);
    await new Promise(r=>setTimeout(r,1100));
    const r=getAI(q,{...profile,tokens:tok,scores:sc});
    setRes(r);
    setTok(t=>t+(r.plan.length>3?20:10));
    setLoad(false);
  };
  const pc={high:'#FF6B6B',medium:'#FFD700',low:'#00F5C4'};
  return(
    <div style={{padding:'20px',maxWidth:'1000px',margin:'0 auto'}} className="fi">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
        <div><h1 style={{fontFamily:'Syne',fontWeight:800,fontSize:'20px',color:'#fff'}}>{greet}, Aryan 👋</h1><p style={{fontSize:'11px',color:'rgba(255,255,255,.3)',marginTop:'2px'}}>MSc Data Science · {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p></div>
        <div style={{textAlign:'right'}}><div style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:'22px',color:'#FFD700',textShadow:'0 0 8px rgba(255,215,0,.6)'}}>{tok}</div><div style={{fontSize:'11px',color:'rgba(255,255,255,.3)'}}>Campus Tokens</div></div>
      </div>
      <div className="glass" style={{padding:'12px 16px',marginBottom:'14px',display:'flex',alignItems:'center',gap:'14px',border:'1px solid rgba(108,99,255,.2)'}}>
        <div style={{position:'relative',width:'40px',height:'40px',flexShrink:0}}>
          <svg className="sp" style={{position:'absolute',inset:0}} viewBox="0 0 40 40" width="40" height="40"><circle cx="20" cy="20" r="17" fill="none" stroke={sc.stress>60?'#FF6B6B':'#00F5C4'} strokeWidth="1.5" strokeDasharray="5 4" opacity=".4"/></svg>
          <div style={{position:'absolute',inset:'6px',borderRadius:'50%',background:'rgba(108,99,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px'}}>{sc.stress<=30?'🧘':sc.stress<=50?'🎯':sc.stress<=65?'⚡':'🔥'}</div>
        </div>
        <div style={{flex:1}}><div style={{fontFamily:'Syne',fontWeight:700,fontSize:'13px',color:sc.stress>65?'#FF6B6B':'#00F5C4'}}>{sc.stress<=30?'Zen Mode':sc.stress<=50?'Focused':sc.stress<=65?'Grinding':'Stressed'}</div><div style={{fontSize:'11px',color:'rgba(255,255,255,.3)',marginTop:'1px'}}>{sc.stress>65?'Take a breath — you got this':'Sharp and productive today'}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:'10px',color:'rgba(255,255,255,.3)'}}>Overall</div><div style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:'16px',color:'#6C63FF'}}>{Math.round((sc.academic+sc.finance+(100-sc.stress))/3)}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'14px'}}>
        <SRing label="Academic" icon="📚" value={sc.academic} type="academic"/>
        <SRing label="Finance" icon="💰" value={sc.finance} type="finance"/>
        <SRing label="Stress" icon="🧠" value={sc.stress} type="stress"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1.7fr',gap:'14px'}}>
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          <div className="glass" style={{padding:'16px',border:'1px solid rgba(108,99,255,.2)'}}>
            <div style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'12px'}}>
              <div style={{width:'7px',height:'7px',borderRadius:'50%',background:'#6C63FF',boxShadow:'0 0 5px #6C63FF'}}/>
              <span style={{fontFamily:'Syne',fontWeight:600,fontSize:'12px',color:'rgba(255,255,255,.7)'}}>Ask AI Copilot</span>
            </div>
            <textarea value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask()}}}
              placeholder='"I have an exam tomorrow, 20 chapters left for ML"' rows={4}
              style={{width:'100%',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'10px',color:'rgba(255,255,255,.85)',fontSize:'12px',resize:'none',outline:'none',lineHeight:1.6,marginBottom:'10px',fontFamily:'DM Sans'}}/>
            <button className="btn-pr" onClick={ask} disabled={!q.trim()||load} style={{width:'100%',padding:'10px'}}>
              {load?'🤔 Thinking...':'✨ Ask AI'}
            </button>
          </div>
          <div className="glass" style={{padding:'12px'}}>
            <p style={{fontSize:'10px',color:'rgba(255,255,255,.3)',marginBottom:'8px',fontFamily:'Syne',textTransform:'uppercase',letterSpacing:'1px'}}>Quick Prompts</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
              {["What should I do today?","Exam tomorrow, 12 chapters left for chemistry","I'm stressed and broke","Haven't slept well"].map(p=>(
                <button key={p} onClick={()=>setQ(p)} disabled={load} style={{fontSize:'11px',padding:'5px 9px',borderRadius:'9px',background:'rgba(108,99,255,.08)',border:'1px solid rgba(108,99,255,.15)',color:'rgba(255,255,255,.5)',cursor:'pointer',fontFamily:'DM Sans',textAlign:'left'}}>{p}</button>
              ))}
            </div>
          </div>
        </div>

              {MJ.map(m=><button key={m} onClick={()=>setMajor(m)} style={{padding:'7px 5px',borderRadius:'9px',fontSize:'10px',cursor:'pointer',textAlign:'center',fontFamily:'DM Sans',background:major===m?'rgba(108,99,255,.25)':'rgba(255,255,255,.04)',border:`1px solid ${major===m?'rgba(108,99,255,.5)':'rgba(255,255,255,.08)'}`,color:major===m?'#fff':'rgba(255,255,255,.5)'}}>{m}</button>)}
            </div>
            <button className="btn-pr" onClick={()=>onDone({name,major:major||'Undeclared'})} style={{width:'100%',padding:'11px'}}>Start my journey 🚀</button>
          </>}
        </div>
      </div>
    </div>
  );
}

/* APP */
function App(){
  const [profile,setProfile]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [ready,setReady]=useState(false);
  useEffect(()=>{try{const s=localStorage.getItem('cl_v3');if(s)setProfile(JSON.parse(s));}catch{}setReady(true);},[]);
  useEffect(()=>{if(profile)localStorage.setItem('cl_v3',JSON.stringify(profile));},[profile]);
  const onDone=({name,major})=>setProfile({tokens:340,streak:6,scores:{academic:72,finance:58,stress:64},name,major,id:'u'+Date.now()});
  if(!ready)return null;
  const pg=()=>{
    switch(page){
      case 'dashboard': return <PgDash profile={profile} setProfile={setProfile}/>;
      case 'grades':    return <PgGrades/>;
      case 'schedule':  return <PgSched/>;
      case 'leaderboard':return <PgLB/>;
      case 'tokens':    return <PgTokens profile={profile}/>;
      case 'copilot':   return <PgDash profile={profile} setProfile={setProfile}/>;
      case 'analytics': return <PgAnalytics profile={profile}/>;
      case 'weekly':    return <PgWeekly profile={profile}/>;
      case 'settings':  return <PgSettings/>;
      default:          return <PgDash profile={profile} setProfile={setProfile}/>;
    }
  };
  return <>
    {!profile&&<Onboard onDone={onDone}/>}
    {profile&&<div style={{display:'flex',height:'100vh',overflow:'hidden'}} className="grid-bg">
      <Sidebar page={page} setPage={setPage} profile={profile}/>
      <main style={{flex:1,overflowY:'auto'}}>{pg()}</main>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
